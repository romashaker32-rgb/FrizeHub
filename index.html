<style>
:root{--a:#7c5cfc;--g:rgba(124,92,252,.35);--s:rgba(124,92,252,.12);--gl:rgba(255,255,255,.05);--b:rgba(255,255,255,.10);--bg:#0a0a0f;--tx:#e8e8f0;--mt:rgba(232,232,240,.5);--r:20px;--rl:28px;--sh:0 8px 32px rgba(0,0,0,.4)}
.red{--a:#fc5c5c;--g:rgba(252,92,92,.35);--s:rgba(252,92,92,.12)}
.blue{--a:#5cb8fc;--g:rgba(92,184,252,.35);--s:rgba(92,184,252,.12)}
.yellow{--a:#fcd95c;--g:rgba(252,217,92,.35);--s:rgba(252,217,92,.12)}
.purple{--a:#d45cfc;--g:rgba(212,92,252,.35);--s:rgba(212,92,252,.12)}
.green{--a:#5cfca2;--g:rgba(92,252,162,.35);--s:rgba(92,252,162,.12)}
.orange{--a:#fc8c5c;--g:rgba(252,140,92,.35);--s:rgba(252,140,92,.12)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(124,92,252,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(92,184,252,.08) 0%,transparent 55%),var(--bg)}
.grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:linear-gradient(rgba(255,255,255,.7) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.7) 1px,transparent 1px);background-size:40px 40px}
#sc{position:fixed;inset:0;pointer-events:none;z-index:1}
/* LOADER */
.ldr{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .5s,visibility .5s}
.ldr.gone{opacity:0;visibility:hidden}
.lt{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--a),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lbw{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.lb{height:100%;width:0;background:var(--a);border-radius:99px;box-shadow:0 0 12px var(--g);animation:ld 1.4s ease forwards}
@keyframes ld{to{width:100%}}
/* NAV */
nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;width:min(96%,1200px);background:rgba(255,255,255,.05);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--b);border-radius:999px;padding:10px 20px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);transition:box-shadow .3s}
nav:hover{box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 40px var(--g),inset 0 1px 0 rgba(255,255,255,.1)}
.logo{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:800;color:#fff;text-decoration:none;margin-right:8px}
.li2{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--a),rgba(255,255,255,.2));display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 16px var(--g)}
.nl{display:flex;align-items:center;gap:2px;flex:1}
.na{padding:7px 16px;border-radius:999px;font-size:.88rem;font-weight:500;color:var(--mt);background:transparent;border:none;cursor:pointer;transition:all .2s;text-decoration:none;white-space:nowrap;font-family:'Outfit',sans-serif}
.na:hover{color:var(--tx);background:rgba(255,255,255,.07)}
.na.on{color:#fff;background:var(--s);box-shadow:0 0 16px var(--g)}
.ns{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:7px 14px;min-width:200px;transition:all .2s}
.ns:focus-within{border-color:var(--a);box-shadow:0 0 16px var(--g)}
.ns input{background:transparent;border:none;outline:none;color:var(--tx);font-family:inherit;font-size:.85rem;width:100%}
.ns input::placeholder{color:var(--mt)}
.bl{padding:8px 20px;border-radius:999px;background:var(--a);border:none;cursor:pointer;color:#fff;font-family:inherit;font-size:.88rem;font-weight:600;box-shadow:0 0 20px var(--g);transition:all .2s;white-space:nowrap}
.bl:hover{transform:scale(1.04);box-shadow:0 0 30px var(--g)}
/* PAGES */
main{position:relative;z-index:2;padding-top:100px;min-height:100vh}
.page{display:none;padding:0 max(16px,calc(50% - 600px)) 80px;animation:fu .4s ease}
.page.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.hero{padding:40px 0 36px}
.hero h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:10px}
.hero h1 span{color:var(--a);text-shadow:0 0 30px var(--g)}
.hero p{color:var(--mt);font-size:1rem}
/* FILTER */
.fb{display:flex;align-items:center;gap:12px;margin-bottom:32px;flex-wrap:wrap}
.fs{display:flex;align-items:center;gap:10px;background:var(--gl);backdrop-filter:blur(16px);border:1px solid var(--b);border-radius:999px;padding:10px 18px;flex:1;min-width:200px;max-width:420px;transition:all .2s}
.fs:focus-within{border-color:var(--a);box-shadow:0 0 20px var(--g)}
.fs input{background:transparent;border:none;outline:none;color:var(--tx);font-family:inherit;font-size:.9rem;width:100%}
.fs input::placeholder{color:var(--mt)}
.ft{display:flex;align-items:center;gap:4px;background:var(--gl);backdrop-filter:blur(16px);border:1px solid var(--b);border-radius:999px;padding:6px 8px;margin-left:auto}
.tab{padding:6px 16px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.83rem;font-weight:500;color:var(--mt);background:transparent;transition:all .2s}
.tab.on{background:var(--s);color:var(--tx);box-shadow:0 0 14px var(--g)}
.tab:hover:not(.on){background:rgba(255,255,255,.06);color:var(--tx)}
/* SKIN CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.sc{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative}
.sc::before{content:'';position:absolute;inset:0;border-radius:var(--r);background:linear-gradient(135deg,var(--s),transparent);opacity:0;transition:opacity .3s}
.sc:hover{transform:translateY(-6px) scale(1.02);border-color:var(--a);box-shadow:var(--sh),0 0 30px var(--g)}
.sc:hover::before{opacity:1}
.siw{aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.2);position:relative;overflow:hidden}
.siw img{width:90px;height:150px;object-fit:contain;image-rendering:pixelated;transition:transform .4s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 8px 20px rgba(0,0,0,.6))}
.sc:hover .siw img{transform:scale(1.08) translateY(-4px)}
.sin{padding:12px 14px 14px}
.sn{font-size:.88rem;font-weight:600;margin-bottom:4px}
.su{font-size:.75rem;color:var(--mt);display:flex;align-items:center;gap:5px}
/* POPUP */
.ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s}
.ov.on{opacity:1;visibility:visible}
.pop{background:rgba(15,15,24,.92);backdrop-filter:blur(40px) saturate(180%);border:1px solid var(--b);border-radius:var(--rl);padding:32px;width:min(90vw,460px);box-shadow:var(--sh),0 0 60px var(--g);transform:scale(.92) translateY(12px);transition:transform .3s cubic-bezier(.4,0,.2,1);position:relative}
.ov.on .pop{transform:scale(1) translateY(0)}
.pc{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--b);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:1.1rem;transition:all .2s}
.pc:hover{background:rgba(255,255,255,.12);color:var(--tx)}
.pp{display:flex;align-items:center;justify-content:center;padding:32px;background:rgba(0,0,0,.3);border-radius:var(--r);margin-bottom:24px;position:relative;overflow:hidden}
.pp::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 80%,var(--s),transparent 60%)}
.pp img{width:110px;height:auto;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 12px 30px rgba(0,0,0,.7));position:relative;z-index:1;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.pt{font-size:1.4rem;font-weight:700;margin-bottom:6px}
.ps{font-size:.85rem;color:var(--mt);margin-bottom:20px}
.cmd{background:rgba(0,0,0,.4);border:1px solid var(--b);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--a);word-break:break-all;line-height:1.5}
.cp2{width:100%;padding:12px;border-radius:12px;background:var(--a);border:none;cursor:pointer;color:#fff;font-family:inherit;font-size:.9rem;font-weight:600;box-shadow:0 0 20px var(--g);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.cp2:hover{transform:scale(1.02);box-shadow:0 0 32px var(--g)}
.cp2.ok{background:#5cfca2;color:#0a0a0f;box-shadow:0 0 20px rgba(92,252,162,.4)}
/* SERVERS */
.sl{display:flex;flex-direction:column;gap:12px}
.sv{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--b);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;gap:20px;transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden}
.sv::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--a);border-radius:3px 0 0 3px;transform:scaleY(0);transition:transform .3s}
.sv:hover{transform:translateX(6px);border-color:var(--a);box-shadow:var(--sh),0 0 24px var(--g)}
.sv:hover::before{transform:scaleY(1)}
.si3{width:56px;height:56px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:rgba(0,0,0,.3);border:1px solid var(--b)}
.svn{flex:1;min-width:0}
.svt{font-size:1rem;font-weight:600;margin-bottom:4px}
.sip{font-size:.8rem;color:var(--mt);font-family:'JetBrains Mono',monospace}
.sm{display:flex;align-items:center;gap:16px;flex-shrink:0}
.pg{font-size:.78rem;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:999px;background:rgba(92,252,162,.12);color:#5cfca2;border:1px solid rgba(92,252,162,.2)}
.pg.hi{background:rgba(252,217,92,.12);color:#fcd95c;border-color:rgba(252,217,92,.2)}
.pg.off{background:rgba(252,92,92,.12);color:#fc5c5c;border-color:rgba(252,92,92,.2)}
.spl{font-size:.82rem;color:var(--mt);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#5cfca2;box-shadow:0 0 8px rgba(92,252,162,.7);animation:pu 2s infinite}
.dot.d{background:#fc5c5c;box-shadow:none;animation:none}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
/* LINKS */
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.lc{background:var(--gl);backdrop-filter:blur(20px);border:1px solid var(--b);border-radius:var(--rl);padding:32px 24px;text-align:center;text-decoration:none;color:inherit;transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;display:block;position:relative;overflow:hidden}
.lc::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--s),transparent 60%);opacity:0;transition:opacity .3s}
.lc:hover{border-color:var(--a);box-shadow:var(--sh),0 0 32px var(--g)}
.lc:hover::before{opacity:1}
.lic{width:64px;height:64px;border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:var(--s);border:1px solid rgba(255,255,255,.08);transition:transform .3s}
.lc:hover .lic{transform:scale(1.12) rotate(-4deg)}
.ln{font-size:1rem;font-weight:600;margin-bottom:6px}
.ld{font-size:.8rem;color:var(--mt)}
/* SETTINGS FAB */
.fab{position:fixed;bottom:24px;left:24px;z-index:200;width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid var(--b);cursor:grab;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh),0 0 20px var(--g);transition:border-color .2s,box-shadow .2s,transform .1s;user-select:none}
.fab:hover{border-color:var(--a);box-shadow:var(--sh),0 0 30px var(--g);transform:scale(1.05)}
.fab svg{transition:transform .4s}
.fab:hover svg{transform:rotate(45deg)}
.sp2{position:fixed;bottom:88px;left:24px;z-index:200;width:280px;background:rgba(10,10,20,.9);backdrop-filter:blur(32px) saturate(180%);border:1px solid var(--b);border-radius:var(--rl);padding:20px;box-shadow:var(--sh),0 0 40px var(--g);opacity:0;visibility:hidden;transform:translateY(12px) scale(.95);transition:all .25s cubic-bezier(.4,0,.2,1)}
.sp2.on{opacity:1;visibility:visible;transform:none}
.stit{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--mt);margin-bottom:14px}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.srow label{font-size:.88rem;font-weight:500}
.tg{width:44px;height:24px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);cursor:pointer;position:relative;transition:all .25s}
.tg.on{background:var(--a);border-color:var(--a);box-shadow:0 0 16px var(--g)}
.tg::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.5);transition:all .25s cubic-bezier(.4,0,.2,1)}
.tg.on::after{left:23px;background:#fff}
.sdiv{height:1px;background:var(--b);margin:4px 0 14px}
.tgr{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
.td{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.td:hover{transform:scale(1.15)}
.td.on{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.4)}
/* TOAST */
.toast{position:fixed;bottom:32px;right:32px;z-index:999;background:rgba(15,15,24,.95);backdrop-filter:blur(20px);border:1px solid var(--a);border-radius:12px;padding:12px 20px;font-size:.88rem;font-weight:500;box-shadow:0 0 24px var(--g);color:var(--tx);transform:translateY(16px) scale(.95);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.on{transform:none;opacity:1}
@media(max-width:768px){.ns{display:none}.sg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.lg{grid-template-columns:repeat(2,1fr)}.sm{flex-direction:column;gap:6px;align-items:flex-end}}
@media(max-width:480px){nav{padding:8px 14px;gap:4px}.na{padding:6px 10px;font-size:.82rem}.bl{padding:7px 14px;font-size:.82rem}}
</style>
</head>
<body>

<div class="ldr" id="L"><div class="lt" id="Ltxt"></div><div class="lbw"><div class="lb"></div></div></div>
<div class="bg"></div><div class="grid"></div><canvas id="sc"></canvas>

<nav>
  <a class="logo" href="#" onclick="go('skins');return false"><div class="li2">⛏</div><span id="siteName"></span></a>
  <div class="nl">
    <a class="na on" id="n-skins" onclick="go('skins');return false" href="#">Skins</a>
    <a class="na" id="n-servers" onclick="go('servers');return false" href="#">Servers</a>
    <a class="na" id="n-links" onclick="go('links');return false" href="#">Links</a>
  </div>
  <div class="ns">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="opacity:.4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input placeholder="Поиск скинов…" oninput="filterSkins(this.value)">
  </div>
  <button class="bl">Login</button>
</nav>

<main>
  <div class="page on" id="p-skins">
    <div class="hero"><h1>Minecraft <span>Skins</span></h1><p>Нажми на скин — скопируй команду</p></div>
    <div class="fb">
      <div class="fs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="opacity:.4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input placeholder="Поиск скина…" oninput="filterSkins(this.value)">
      </div>
      <div class="ft">
        <button class="tab on" onclick="setTab(this,'tr')">🔥 Trending</button>
        <button class="tab" onclick="setTab(this,'pop')">👑 Most used</button>
        <button class="tab" onclick="setTab(this,'new')">🕐 Latest</button>
      </div>
    </div>
    <div class="sg" id="skinGrid"></div>
  </div>

  <div class="page" id="p-servers">
    <div class="hero"><h1>Minecraft <span>Servers</span></h1><p>Нажми на сервер — IP скопируется</p></div>
    <div class="sl" id="serverList"></div>
  </div>

  <div class="page" id="p-links">
    <div class="hero"><h1>Мои <span>Ссылки</span></h1><p>Найди меня в интернете</p></div>
    <div class="lg" id="linkGrid"></div>
  </div>
</main>

<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="pop">
    <button class="pc" onclick="closeOvD()">✕</button>
    <div class="pp"><div id="pvImg"></div></div>
    <div class="pt" id="pvName"></div>
    <div class="ps">Команда для применения скина:</div>
    <div class="cmd" id="pvCmd"></div>
    <button class="cp2" id="cpBtn" onclick="doCopy()">📋 Copy Command</button>
  </div>
</div>

<button class="fab" id="fab" onclick="toggleSet()" oncontextmenu="startDrag(event)">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<div class="sp2" id="sp2">
  <div class="stit">Настройки</div>
  <div class="srow"><label>❄️ Снег</label><div class="tg on" id="snowTg" onclick="toggleSnow()"></div></div>
  <div class="sdiv"></div>
  <div class="stit">Тема</div>
  <div class="tgr">
    <div class="td on" style="background:#7c5cfc" onclick="setTheme('',this)"></div>
    <div class="td" style="background:#fc5c5c" onclick="setTheme('red',this)"></div>
    <div class="td" style="background:#5cb8fc" onclick="setTheme('blue',this)"></div>
    <div class="td" style="background:#fcd95c" onclick="setTheme('yellow',this)"></div>
    <div class="td" style="background:#5cfca2" onclick="setTheme('green',this)"></div>
    <div class="td" style="background:#fc8c5c" onclick="setTheme('orange',this)"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.getElementById('siteName').textContent = SITE_NAME
document.getElementById('Ltxt').textContent = '⛏ ' + SITE_NAME

function renderSkins(list) {
  var g = document.getElementById('skinGrid')
  g.innerHTML = ''
  list.forEach(function(s, i) {
    var c = document.createElement('div')
    c.className = 'sc'
    c.style.animationDelay = (i * .04) + 's'
    c.innerHTML = '<div class="siw"><img src="' + s.img + '" alt="' + s.name + '" onerror="this.style.opacity=\'0.15\'"></div><div class="sin"><div class="sn">' + s.name + '</div><div class="su">👤 ' + s.uses.toLocaleString() + ' uses</div></div>'
    c.onclick = function() { openSkin(s) }
    g.appendChild(c)
  })
}

function filterSkins(q) {
  renderSkins(SKINS.filter(function(s) { return s.name.toLowerCase().includes(q.toLowerCase()) }))
}

function setTab(el, t) {
  document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('on') })
  el.classList.add('on')
  var s = SKINS.slice().sort(function(a, b) { return t === 'new' ? b.uses - a.uses : b.uses - a.uses })
  renderSkins(s)
}

var curCmd = ''
function openSkin(s) {
  curCmd = '/skin url ' + s.skinUrl + ' Classic'
  document.getElementById('pvName').textContent = s.name
  document.getElementById('pvCmd').textContent = curCmd
  document.getElementById('pvImg').innerHTML = '<img src="' + s.img + '" alt="' + s.name + '" onerror="this.style.opacity=\'0.15\'">'
  document.getElementById('cpBtn').className = 'cp2'
  document.getElementById('cpBtn').textContent = '📋 Copy Command'
  document.getElementById('ov').classList.add('on')
  document.body.style.overflow = 'hidden'
}
function closeOv(e) { if (e.target === document.getElementById('ov')) closeOvD() }
function closeOvD() { document.getElementById('ov').classList.remove('on'); document.body.style.overflow = '' }
function doCopy() {
  navigator.clipboard.writeText(curCmd).then(function() {
    var b = document.getElementById('cpBtn')
    b.className = 'cp2 ok'; b.textContent = '✅ Скопировано!'
    showToast('Команда скопирована!')
    setTimeout(function() { b.className = 'cp2'; b.textContent = '📋 Copy Command' }, 2000)
  })
}

function renderServers() {
  var l = document.getElementById('serverList')
  l.innerHTML = ''
  SERVERS.forEach(function(s, i) {
    var pc = !s.online ? 'off' : s.ping > 80 ? 'hi' : ''
    var pt = !s.online ? 'Offline' : s.ping + 'ms'
    var c = document.createElement('div')
    c.className = 'sv'; c.style.animationDelay = (i * .06) + 's'
    c.innerHTML = '<div class="si3">' + s.icon + '</div><div class="svn"><div class="svt">' + s.name + '</div><div class="sip">' + s.ip + '</div></div><div class="sm"><div class="spl"><div class="dot' + (s.online ? '' : ' d') + '"></div>' + (s.online ? s.players + ' / ' + s.maxPlayers : 'Offline') + '</div><div class="pg ' + pc + '">' + pt + '</div></div>'
    c.onclick = function() { navigator.clipboard.writeText(s.ip); showToast('IP скопирован: ' + s.ip) }
    l.appendChild(c)
  })
}

function renderLinks() {
  var g = document.getElementById('linkGrid')
  g.innerHTML = ''
  LINKS.forEach(function(l, i) {
    var c = document.createElement('a')
    c.className = 'lc'; c.href = l.url; c.target = '_blank'; c.style.animationDelay = (i * .05) + 's'
    c.innerHTML = '<div class="lic" style="background:' + l.color + '22;border-color:' + l.color + '33;box-shadow:0 0 24px ' + l.color + '44">' + l.icon + '</div><div class="ln">' + l.name + '</div><div class="ld">' + l.desc + '</div>'
    c.addEventListener('mousemove', function(e) {
      var r = c.getBoundingClientRect(), x = (e.clientX - r.left) / r.width - .5, y = (e.clientY - r.top) / r.height - .5
      c.style.transform = 'perspective(600px) rotateY(' + (x * 14) + 'deg) rotateX(' + (-y * 14) + 'deg) translateY(-4px)'
    })
    c.addEventListener('mouseleave', function() { c.style.transform = '' })
    g.appendChild(c)
  })
}

function go(p) {
  document.querySelectorAll('.page').forEach(function(x) { x.classList.remove('on') })
  document.querySelectorAll('.na').forEach(function(x) { x.classList.remove('on') })
  document.getElementById('p-' + p).classList.add('on')
  document.getElementById('n-' + p).classList.add('on')
}

var setOpen = false
function toggleSet() { setOpen = !setOpen; document.getElementById('sp2').classList.toggle('on', setOpen) }
document.addEventListener('click', function(e) {
  if (!e.target.closest('.fab') && !e.target.closest('.sp2')) { setOpen = false; document.getElementById('sp2').classList.remove('on') }
})

var snowOn = true
function toggleSnow() { snowOn = !snowOn; document.getElementById('snowTg').classList.toggle('on', snowOn); document.getElementById('sc').style.opacity = snowOn ? '1' : '0' }
function setTheme(cls, el) { document.body.className = cls; document.querySelectorAll('.td').forEach(function(x) { x.classList.remove('on') }); el.classList.add('on') }

function startDrag(e) {
  e.preventDefault()
  var fab = document.getElementById('fab'), r = fab.getBoundingClientRect(), sx = e.clientX, sy = e.clientY, fx = r.left, fy = r.top
  function mv(e) {
    var nx = Math.max(0, Math.min(window.innerWidth - 60, fx + (e.clientX - sx)))
    var ny = Math.max(0, Math.min(window.innerHeight - 60, fy + (e.clientY - sy)))
    fab.style.left = nx + 'px'; fab.style.top = ny + 'px'; fab.style.bottom = 'auto'; fab.style.right = 'auto'
    var p = document.getElementById('sp2'); p.style.left = nx + 'px'; p.style.top = (ny - 290) + 'px'; p.style.bottom = 'auto'
  }
  function up() { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up) }
  document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up)
}

;(function() {
  var cv = document.getElementById('sc'), ctx = cv.getContext('2d'), fl = []
  function sz() { cv.width = window.innerWidth; cv.height = window.innerHeight }
  sz(); window.addEventListener('resize', sz)
  for (var i = 0; i < 100; i++) fl.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, r: Math.random() * 2 + .5, s: Math.random() * .7 + .2, d: Math.random() * 2 - 1, o: Math.random() * .5 + .1 })
  function dr() {
    ctx.clearRect(0, 0, cv.width, cv.height)
    if (!snowOn) { requestAnimationFrame(dr); return }
    fl.forEach(function(f) {
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,' + f.o + ')'; ctx.fill()
      f.y += f.s; f.x += f.d * .3
      if (f.y > cv.height) { f.y = -5; f.x = Math.random() * cv.width }
      if (f.x > cv.width) f.x = 0
      if (f.x < 0) f.x = cv.width
    })
    requestAnimationFrame(dr)
  }
  dr()
})()

function showToast(m) { var t = document.getElementById('toast'); t.textContent = '✅ ' + m; t.classList.add('on'); setTimeout(function() { t.classList.remove('on') }, 2500) }

window.addEventListener('load', function() {
  setTimeout(function() {
    document.getElementById('L').classList.add('gone')
    renderSkins(SKINS); renderServers(); renderLinks()
  }, 1200)
})
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeOvD() })
</script>
</body>
</html>
